{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Smart Exam Proctor - Login</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="container">

    <h1>Smart Exam Proctor</h1>

    <form method="POST">
        {% csrf_token %}

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>
    </form>

</div>

</body>
</html>
